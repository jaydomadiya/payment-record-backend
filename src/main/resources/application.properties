spring.application.name=payment-record-be

# Activates application-local.properties (git-ignored, holds the real Supabase
# credentials) by default so a plain IDE "Run" doesn't silently fall through to
# whatever Postgres happens to be listening on localhost:5432. Override with
# -Dspring.profiles.active=<other> or SPRING_PROFILES_ACTIVE=<other> for CI/prod.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Supabase PostgreSQL datasource. Append ?sslmode=require to SPRING_DATASOURCE_URL if your
# Supabase project enforces SSL (recommended).
#
# IMPORTANT for Render (and most other PaaS hosts): Supabase's "direct connection" host
# (db.<project-ref>.supabase.co) resolves over IPv6 only. Render's network is IPv4-only,
# so that host is simply unreachable from there and JPA start-up will fail. Use the
# Supabase "Connection Pooling" string instead (Project Settings -> Database -> Connection
# Pooling), which looks like:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
#   SPRING_DATASOURCE_USERNAME=postgres.<project-ref>   (note the ".<project-ref>" suffix, pooler-specific)
# The direct-connection host above is fine for local development (see application-local.properties).
#
# No fallback default on purpose: if SPRING_DATASOURCE_URL isn't supplied, startup fails loudly
# instead of silently connecting to a coincidentally-running local database.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=PaymentHistoryHikariPool

# JPA / Hibernate. Use 'validate' once the schema is managed by a migration tool
# (e.g. Flyway) so the application never mutates the schema at startup in production.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
# Set explicitly so Hibernate never needs a live JDBC connection just to auto-detect
# the dialect at boot. Without this, a datasource that can't be reached (wrong host,
# IPv6-only Supabase "direct connection" from an IPv4-only host, bad credentials, etc.)
# fails with a confusing "Unable to determine Dialect" error instead of the real
# underlying connection exception.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

logging.level.com.payment_record_be=INFO
logging.level.org.hibernate.SQL=WARN
