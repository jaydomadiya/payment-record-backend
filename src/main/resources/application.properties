spring.application.name=payment-record-be

# Activates application-local.properties (git-ignored, holds the real Supabase
# credentials) by default so a plain IDE "Run" doesn't silently fall through to
# whatever Postgres happens to be listening on localhost:5432. Override with
# -Dspring.profiles.active=<other> or SPRING_PROFILES_ACTIVE=<other> for CI/prod.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Supabase PostgreSQL datasource. Append ?sslmode=require to DB_URL if your Supabase
# project enforces SSL (recommended). Prefer the Supabase "Session" pooler connection
# string over the direct connection when running in serverless/short-lived environments.
# No fallback default on purpose: if DB_URL isn't supplied, startup fails loudly
# instead of silently connecting to a coincidentally-running local database.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=PaymentHistoryHikariPool

# JPA / Hibernate. Use 'validate' once the schema is managed by a migration tool
# (e.g. Flyway) so the application never mutates the schema at startup in production.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

logging.level.com.payment_record_be=INFO
logging.level.org.hibernate.SQL=WARN
